          - not_null
          - unique
      - name: dimensions_nor
        data_type: text
      - name: dimensions_ocs
        data_type: text
      - name: dimensions_tdw
        description: "Type d'habitation : 1 = Maison, 2 = Appartement"
        data_type: text
