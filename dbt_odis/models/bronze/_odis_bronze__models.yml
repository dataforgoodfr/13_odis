  # Services
  - name: services_services
    description: |-
      Extraction du JSON source logement nombre de logements totaux par zone géographique, granularité fine au niveau du code INSEE
      Les indicateurs ne concernent que certains types de services inclus dans la requête, les facility_type suivants :
      Réseau de proximité Pôle emploi: A122
      Implantations France services: A128
      Banques, caisses d'épargne: A203
      Bureau de poste: A206
      Agence postale: A208
      École de conduite: A304
      Salon de Coiffure: A501
      Agence de travail temporaire: A503
      Restaurant ou Restauration rapide: A504
    columns:
      - name: id
        description: index
        data_type: integer
      - name: value
        description: nombre mesuré du total de services par type, par zone géographique et par année
        data_type: text
      - name: geo
        description: "Clé primaire unique d'identification : Année de mesure - Type de zone géographique - Code INSEE (COM = 5 chiffres) ou Code postal (DEP = 3 chiffres et REG = 2 chiffres)"
        data_type: text
      - name: bpe_measure
        description: FACILITIES = services
        data_type: text
      - name: time_period
        description: Période temporelle en année de mesure de la donnée
        data_type: text
      - name: facility_dom
        description: 1er niveau de classification de service
        data_type: text
      - name: facility_sdom
        description: 2eme niveau de classification de service
        data_type: text
      - name: facility_type
        description: |-
          3eme niveau de classification de service
          A122 = Réseau de proximité Pôle emploi
          A128 = Implantations France services
          A203 = Banques, caisses d'épargne
          A206 = Bureau de poste
          A208 = Agence postale
          A304 = École de conduite
          A501 = Salon de Coiffure
          A503 = Agence de travail temporaire
          A504 = Restaurant ou Restauration rapide
        data_type: text
      - name: created_at
        description: date d'extraction de la donnée
        data_type: timestamp without time zone

