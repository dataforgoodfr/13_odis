        data_type: text
      - name: code
        description: Code officiel français du département, string pour garder 01, 2A
        data_type: text
      - name: type
        description: Niveau de collectivité
        tests:
          - accepted_values:
              values:
                - Departement
        data_type: text
      - name: chef_lieu
        description: Code INSEE officiel français des communes/préfecture du département, string pour garder 01...
        tests:
          - not_null
          - unique
        data_type: text
      - name: intitule
        description: Nom du département avec articles et tirets
        data_type: text
      - name: type_article
        data_type: text
      - name: date_creation
        data_type: text
      - name: intitule_sans_article
        description: Nom du département sans articles
        data_type: text
      - name: created_at
        description: date d'extraction de la donnée
        data_type: timestamp without time zone

